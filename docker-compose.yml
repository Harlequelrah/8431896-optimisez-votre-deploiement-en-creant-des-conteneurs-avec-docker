services :
  libra :
    image: libra:latest
    ports :
      - 8080:80
    environment:
      - s3://minio:NotSoSecret@minio:9000/libra

  minio:
    image: minio/minio:latest
    ports :
        - 9000:9000
        - 9001:9001
    volumes:
      - minio_storage:/data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: NotSoSecret
    command: server --console-address ":9001" /data


volumes:
  minio_storage:
